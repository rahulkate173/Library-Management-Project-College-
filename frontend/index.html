<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <i data-lucide="library"></i>
            <span>LibraSoft</span>
        </div>
        <ul class="nav-links">
            <li class="nav-item">
                <a href="#" class="nav-link active" data-view="dashboard">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link" data-view="books">
                    <i data-lucide="book"></i> Books
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link" data-view="students">
                    <i data-lucide="users"></i> Students
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link" data-view="transactions">
                    <i data-lucide="repeat"></i> Issue/Return
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link" data-view="reports">
                    <i data-lucide="file-text"></i> Reports
                </a>
            </li>
        </ul>
        <div class="nav-footer">
            <a href="#" class="nav-link" id="logout-btn">
                <i data-lucide="log-out"></i> Logout
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-container">
        <header class="top-navbar">
            <h1 class="page-title" id="view-title">Dashboard</h1>
            <div class="user-profile">
                <span>Admin User</span>
                <i data-lucide="user"></i>
            </div>
        </header>

        <div class="content-area" id="main-content">
            <!-- Dynamic Content Injected Here -->
        </div>
    </main>

    <!-- Modal for Forms -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modal-title">Add New</h2>
            <form id="modal-form">
                <div id="form-fields"></div>
                <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="save-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <script src="js/app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
